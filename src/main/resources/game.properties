# ===========================================
# Tank War Game Configuration
# ===========================================
# Key convention: kebab-case(RecordName).kebab-case(fieldName)

# --- Window ---
window.title=Tank War
window.width=1280
window.height=960

# --- Game Loop ---
game-loop.frame-interval-ms=50

# --- Player Tank ---
player-tank.init-x=610
player-tank.init-y=870
player-tank.speed=5

# --- Enemy Tank ---
enemy-tank.count=15
enemy-tank.start-x=100
enemy-tank.spacing-x=100
enemy-tank.start-y=40
enemy-tank.spawn-max-y=400
enemy-tank.speed=3
enemy-tank.fire-threshold=95
enemy-tank.turn-threshold=95

# --- Bullet ---
bullet.speed=10

# --- Boundary ---
boundary.margin=2
boundary.top-offset=28

# --- Image ---
image.player-tank=images/GoodTank1.png
image.enemy-tank=images/BadTank1.png
image.bullet=images/bulletU.png
image.explode-prefix=images/e
image.explode-suffix=.gif
image.explode-count=16

# --- Audio ---
audio.fire=audio/tank_fire.wav
audio.explode=audio/explode.wav
audio.move=audio/tank_move.wav
audio.bgm=audio/bgm.wav
