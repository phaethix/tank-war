name: Build & Release

on:
  push:
    branches:
      - master
    tags:
      - 'v*'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
      fail-fast: false  # 确保所有平台都尝试构建

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      # -------------------------------------------------------------
      # 🍎 针对 macOS 打包 (绿色免安装 zip) - 完全重写版
      # -------------------------------------------------------------
      - name: jpackage for macOS
        if: matrix.os == 'macos-latest'
        run: |
          export JAVA_HOME=$(/usr/libexec/java_home -v 25)
          
          echo "📦 Running jpackage for macOS..."
          mkdir -p dist
          cd dist
          
          jpackage \
            --name "TankWar" \
            --input ../target \
            --main-jar tank-war-1.0-SNAPSHOT.jar \
            --main-class org.tinygame.tankwar.Main \
            --type app-image \
            --java-options "--enable-preview" \
            --dest . || {
              echo "❌ jpackage failed!"
              exit 1
            }
          
          echo "🔍 Generated files:"
          ls -la
          
          # 查找实际生成的 .app 文件
          APP_FILE=$(find . -name "*.app" -type d | head -n 1)
          if [ -z "$APP_FILE" ]; then
            echo "❌ No .app file found!"
            exit 1
          fi
          
          echo "✅ Found app at: $APP_FILE"
          
          echo "🔒 Signing app (free signing)..."
          /usr/bin/codesign --force --deep --sign - "$APP_FILE" || {
            echo "⚠️ codesign warning (expected)"
          }
          
          echo "🧹 Removing quarantine attributes..."
          /bin/xattr -cr "$APP_FILE" || {
            echo "⚠️ xattr warning"
          }
          
          echo "📦 Creating ZIP archive..."
          cd ..
          zip -r TankWar-macOS.zip dist/TankWar.app || {
            echo "❌ zip failed!"
            exit 1
          }
          
          echo "✅ macOS build completed!"
          ls -la TankWar-macOS.zip

      # -------------------------------------------------------------
      # 💻 针对 Windows 打包 (绿色免安装 zip)
      # -------------------------------------------------------------
      - name: jpackage for Windows
        if: matrix.os == 'windows-latest'
        run: |
          jpackage `
            --name "TankWar" `
            --input target `
            --main-jar tank-war-1.0-SNAPSHOT.jar `
            --main-class org.tinygame.tankwar.Main `
            --type app-image `
            --java-options "--enable-preview" `
            --dest dist

          Compress-Archive -Path dist/TankWar -DestinationPath dist/TankWar-Windows.zip

      # -------------------------------------------------------------
      # 🐧 针对 Linux 打包 (绿色免安装 tar.gz)
      # -------------------------------------------------------------
      - name: jpackage for Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          jpackage \
            --name "TankWar" \
            --input target \
            --main-jar tank-war-1.0-SNAPSHOT.jar \
            --main-class org.tinygame.tankwar.Main \
            --type app-image \
            --java-options "--enable-preview" \
            --dest dist
          
          cd dist
          tar -czvf TankWar-Linux.tar.gz TankWar

      # -------------------------------------------------------------
      # 📤 上传生成的构建产物 (Artifacts)
      # -------------------------------------------------------------
      - name: Upload macOS Artifact
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: TankWar-macOS
          path: TankWar-macOS.zip
          retention-days: 7

      - name: Upload Windows Artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: TankWar-Windows
          path: dist/TankWar-Windows.zip
          retention-days: 7

      - name: Upload Linux Artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: TankWar-Linux
          path: dist/TankWar-Linux.tar.gz
          retention-days: 7

  # 如果是通过 Git Tag (例如 v1.0.0) 触发的，自动发布到 Releases
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          name: "🎮 Tank War ${{ github.ref_name }}"
          body: |
            🚀 **This is our first official release!**

            ### ✨ Key Features in ${{ github.ref_name }}:
            - **Smooth Combat**: 20 FPS game loop powered by Java virtual threads for responsive movement and shooting.
            - **Intelligent Enemy AI**: Randomized movement, dynamic direction changes, and autonomous firing behavior.
            - **Full Match Flow**: Built-in victory, defeat, and pause overlays for a clearer gameplay experience.
            - **Instant Replay**: Press `R` at any time to restart the match without relaunching the game.
            - **Pause and Resume**: Press `P` to freeze the battlefield and continue whenever you are ready.
            - **Complete Audio System**: Immersive background music and synchronized sound effects for movement, firing, and explosions.

            ---
            ### ⚠️ **IMPORTANT FOR MAC USERS**
            Due to macOS security restrictions (Gatekeeper), you might see an error saying **"TankWar is damaged and can't be opened"** upon first download. This is normal for apps not signed by a paid Apple Developer account.
            
            **How to fix this:**
            1. **Right-click** (or Control+Click) on the `TankWar.app` file inside the ZIP.
            2. Select **"Open"**.
            3. In the popup dialog, click **"Open"** again.
            
            *Alternative Method:*
            Go to **System Settings > Privacy & Security**, scroll down to the bottom, and click **"Open Anyway"** next to the blocked message.
            
            Once opened once, you can double-click to launch normally in the future. 🍎

            Download the archive for your platform, extract it, and enjoy! 🎮
          files: |
            artifacts/TankWar-macOS/TankWar-macOS.zip
            artifacts/TankWar-Windows/TankWar-Windows.zip
            artifacts/TankWar-Linux/TankWar-Linux.tar.gz