name: Build & Release

on:
  push:
    branches:
      - master
    tags:
      - 'v*'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25 
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      # -------------------------------------------------------------
      # 针对 macOS 打包 (绿色免安装 zip)
      # -------------------------------------------------------------
      - name: jpackage for macOS
        if: matrix.os == 'macos-latest'
        run: |
          jpackage \
            --name "TankWar" \
            --input target \
            --main-jar tank-war-1.0-SNAPSHOT.jar \
            --main-class org.tinygame.tankwar.Main \
            --type app-image \
            --java-options "--enable-preview" \
            --dest dist

          cd dist
          zip -r TankWar-macOS.zip TankWar.app

      # -------------------------------------------------------------
      # 针对 Windows 打包 (绿色免安装 zip)
      # -------------------------------------------------------------
      - name: jpackage for Windows
        if: matrix.os == 'windows-latest'
        run: |
          jpackage `
            --name "TankWar" `
            --input target `
            --main-jar tank-war-1.0-SNAPSHOT.jar `
            --main-class org.tinygame.tankwar.Main `
            --type app-image `
            --java-options "--enable-preview" `
            --dest dist

          Compress-Archive -Path dist/TankWar -DestinationPath dist/TankWar-Windows.zip

      # -------------------------------------------------------------
      # 针对 Linux 打包 (绿色免安装 tar.gz)
      # -------------------------------------------------------------
      - name: jpackage for Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          jpackage \
            --name "TankWar" \
            --input target \
            --main-jar tank-war-1.0-SNAPSHOT.jar \
            --main-class org.tinygame.tankwar.Main \
            --type app-image \
            --java-options "--enable-preview" \
            --dest dist
          
          cd dist
          tar -czvf TankWar-Linux.tar.gz TankWar

      # -------------------------------------------------------------
      # 上传生成的构建产物 (Artifacts)
      # -------------------------------------------------------------
      - name: Upload macOS Artifact
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: TankWar-macOS
          path: dist/TankWar-macOS.zip

      - name: Upload Windows Artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: TankWar-Windows
          path: dist/TankWar-Windows.zip

      - name: Upload Linux Artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: TankWar-Linux
          path: dist/TankWar-Linux.tar.gz

  # 如果是通过 Git Tag (例如 v1.0.0) 触发的，自动发布到 Releases
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          name: "🎮 Tank War ${{ github.ref_name }}"
          body: |
            🚀 **This is our first official release!**

            ### ✨ Key Features in ${{ github.ref_name }}:
            - **Smooth Combat**: 20 FPS game loop powered by Java virtual threads for seamless movement.
            - **Intelligent Enemy AI**: Randomized movement, dynamic direction changes, and smart firing behavior.
            - **Complete Audio System**: Immersive background music and synchronized sound effects for moving, firing, and explosions.

            Download the archive for your platform, extract it, and run the app directly. 🎮
          files: |
            artifacts/TankWar-macOS/TankWar-macOS.zip
            artifacts/TankWar-Windows/TankWar-Windows.zip
            artifacts/TankWar-Linux/TankWar-Linux.tar.gz
