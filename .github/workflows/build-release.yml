name: Build & Release

on:
  push:
    branches:
      - master
    tags:
      - 'v*'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
      fail-fast: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      # -------------------------------------------------------------
      # 💻 针对 Windows 打包
      # -------------------------------------------------------------
      - name: jpackage for Windows
        if: matrix.os == 'windows-latest'
        run: |
          jpackage `
            --name "tank-war" `
            --input target `
            --main-jar tank-war-1.0-SNAPSHOT.jar `
            --main-class org.tinygame.tankwar.Main `
            --type app-image `
            --java-options "--enable-preview" `
            --dest dist

          Compress-Archive -Path dist/tank-war -DestinationPath dist/tank-war-windows.zip

      # -------------------------------------------------------------
      # 🐧 针对 Linux 打包
      # -------------------------------------------------------------
      - name: jpackage for Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          jpackage \
            --name "tank-war" \
            --input target \
            --main-jar tank-war-1.0-SNAPSHOT.jar \
            --main-class org.tinygame.tankwar.Main \
            --type app-image \
            --java-options "--enable-preview" \
            --dest dist
          
          cd dist
          tar -czvf tank-war-linux.tar.gz tank-war

      # -------------------------------------------------------------
      # 📤 上传生成的构建产物 (Artifacts)
      # -------------------------------------------------------------
      - name: Upload Windows Artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: tank-war-windows
          path: dist/tank-war-windows.zip
          retention-days: 7

      - name: Upload Linux Artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: tank-war-linux
          path: dist/tank-war-linux.tar.gz
          retention-days: 7

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          name: "🎮 tank-war ${{ github.ref_name }}"
          body: |
            🚀 **This is our first official release!**

            ### ✨ Key Features in ${{ github.ref_name }}:
            - **Smooth Combat**: 20 FPS game loop powered by Java virtual threads for responsive movement and shooting.
            - **Intelligent Enemy AI**: Randomized movement, dynamic direction changes, and autonomous firing behavior.
            - **Full Match Flow**: Built-in victory, defeat, and pause overlays for a clearer gameplay experience.
            - **Instant Replay**: Press `R` at any time to restart the match without relaunching the game.
            - **Pause and Resume**: Press `P` to freeze the battlefield and continue whenever you are ready.
            - **Complete Audio System**: Immersive background music and synchronized sound effects for movement, firing, and explosions.

            ---
            Download the archive for your platform, extract it, and enjoy! 🎮
          files: |
            artifacts/tank-war-windows/tank-war-windows.zip
            artifacts/tank-war-linux/tank-war-linux.tar.gz